version: '3.8'

services:
  # ============================================
  # Frontend - React + Vite (Development)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - sentinelx-network
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

  # ============================================
  # Backend - Node.js + Express
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/sentinelx
      - JWT_SECRET=${JWT_SECRET:-sentinelx-super-secret-jwt-key-2026}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:5173
      - ML_SERVICE_URL=http://ml-service:7860
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - IPINFO_TOKEN=${IPINFO_TOKEN:-}
      - WHOIS_API_KEY=${WHOIS_API_KEY:-}
    depends_on:
      - mongodb
      - ml-service
    networks:
      - sentinelx-network
    restart: unless-stopped

  # ============================================
  # ML Service - Python FastAPI
  # ============================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - sentinelx-network
    volumes:
      - ml-models:/app/models
    restart: unless-stopped

  # ============================================
  # MongoDB Database
  # ============================================
  mongodb:
    image: mongo:7
    volumes:
      - mongodb-data:/data/db
    networks:
      - sentinelx-network
    restart: unless-stopped

# ============================================
# Volumes
# ============================================
volumes:
  mongodb-data:
    driver: local
  ml-models:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  sentinelx-network:
    driver: bridge
